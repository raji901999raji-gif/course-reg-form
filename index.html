<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reg form</title>
    <link rel="stylesheet" href="/forms.css">
  </head>
  <body>
    <h1 class="heading">Course Registration form</h1>
    <form action="https://tai.thetapacademy.com/">
      <fieldset style="border-radius: 10px">
        <legend>Personal details</legend>
        <table>
          <tr>
            <td><label for="fname">First name</label></td>
            <td><input type="text" placeholder="Riji"  id="fname" name="fname"/>
              <p class="tooltip">Enter your Name</p>
            </td>
          </tr>
          <tr>
            <td><label for="sname">Surname</label></td>
            <td><input type="text" placeholder="Kuruva" id="sname" name="sname"/>
              <p>Enter your surname</p>
            </td>
          </tr>
          <tr>
            <td><label for="mobno">Mobile No</label></td>
            <td><input type="tel"  placeholder="6304077405" id="mobno" name="mobno"/>
              <p>Enter your Number</p>
            </td>
          </tr>
          <tr>
            <td><label for="email">Email</label></td>
            <td><input type="email" id="email" name="email"/>
              <p>Enter your Email</p>
              <img class="Valid" src="https://cdn-icons-png.flaticon.com/128/14090/14090371.png" alt="correct logo">
              <img class="Invalid" src="https://cdn-icons-png.flaticon.com/128/11560/11560478.png" alt="">
            </td>
          </tr>
          <tr>
            <td><label for="password">Password</label></td>
            <td><input type="password" id="password" name="password"/>
              <p>Enter your Password</p>
            </td>
          </tr>
          <tr>
            <td><label for="cpassword"> Conform Password</label></td>
            <td><input type="password" id="cpassword" name="cpassword"/>
              <p>conform password</p>
            </td>
          </tr>
          <tr>
            <td><label for="">DOB</label></td>
            <td><input type="date" />
              <p>Enter date of birth</p>
            </td>
          </tr>
          <tr>
            <td><label for="">Gender</label></td>
            <td>
              <input type="radio"  name="gender" value="MALE"/><label for="">Male</label>
              <input type="radio" name="gender"  value="FEMALE"/><label for="">Female</label>
              <input type="radio" name="gender"  value="OTHERS"/><label for="">Others</label>
            </td>
          </tr>
          <tr>
            <td><label for="">Select Country</label></td>
            <td>
              <select name="" id="">
                <option value="">---Select one Country---</option>
                <option value="INDIA">INDIA</option>
                <option value="UK">UK</option>
                <option value="USA">USA</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><label for="">Upload picture</label></td>
            <td><input type="file" multiple /></td>
          </tr>
        </table>
        <button type="submit">submit</button>
      </fieldset>
      <br>
       <fieldset>
        <legend>course details</legend>
      <table>
        <tr>
          <td><label for="">Select course</label></td>
          <td>
            <select name="" id="">
              <option value="">---Select course---</option>
              <option value="">JAVA FULL STACK</option>
              <option value="">PYTHON FULL STACK</option>
            </select>
          </td>
        </tr>
        <table>
          <tr>
          <td><label for="">Delivery mode</label></td>
          <td>
            <input type="checkbox" /> <label for="">ONLINE</label>
            <input type="checkbox" /> <label for="">OFFLINE</label> <br />
          </td>
        </tr>
      </table>
      <label for="">Comments</label><br />
      <textarea name="" id="" cols="45" rows="4"></textarea>
      </fieldset>
      </table>
    </form>
  </body>
</html>
